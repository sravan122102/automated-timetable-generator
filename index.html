<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated Timetable Generator</title>
    <meta name="description" content="Generate and manage school/college timetables automatically.">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Icons (FontAwesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- HTML2PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

    <!-- App Container -->
    <div id="app-container" class="hidden">
        
        <!-- Sidebar -->
        <aside id="sidebar">
            <div class="logo">
                <i class="fa-solid fa-calendar-days"></i> TimeSync
            </div>
            <nav id="main-nav">
                <a href="#dashboard" class="nav-link" data-view="dashboard"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
                <a href="#teachers" class="nav-link" data-view="teachers"><i class="fa-solid fa-chalkboard-user"></i> Teachers</a>
                <a href="#subjects" class="nav-link" data-view="subjects"><i class="fa-solid fa-book"></i> Subjects</a>
                <a href="#classrooms" class="nav-link" data-view="classrooms"><i class="fa-solid fa-door-open"></i> Classrooms</a>
                <a href="#classes" class="nav-link" data-view="classes"><i class="fa-solid fa-users"></i> Classes</a>
                <a href="#assignments" class="nav-link" data-view="assignments"><i class="fa-solid fa-link"></i> Assignments</a>
                <a href="#generator" class="nav-link" data-view="generator"><i class="fa-solid fa-wand-magic-sparkles"></i> Generator</a>
                <a href="#timetable" class="nav-link" data-view="timetable"><i class="fa-solid fa-table"></i> View Timetable</a>
            </nav>
            <div style="padding: 24px; margin-top: auto;">
                <button id="logout-btn" class="btn btn-secondary" style="width: 100%; justify-content: center;">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main id="main-content">
            <!-- Views will be dynamically loaded here -->
            <div id="view-container"></div>
        </main>
        
    </div>

    <!-- Login View (Outside App Container) -->
    <div id="login-view">
        <div class="card login-card">
            <div class="logo"><i class="fa-solid fa-calendar-days"></i> TimeSync</div>
            <p>Welcome back! Please login to your account.</p>
            <form id="login-form">
                <div class="form-group" style="text-align: left;">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-control" required>
                </div>
                <div class="form-group" style="text-align: left;">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 16px;">Login</button>
            </form>
            <div id="login-error" style="color: var(--danger); margin-top: 16px; font-size: 0.9rem;"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
