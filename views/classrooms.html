<header>
    <h1>Classrooms Management</h1>
    <div class="header-actions">
        <button class="btn btn-primary" onclick="openModal('addClassroomModal')">
            <i class="fa-solid fa-plus"></i> Add Classroom
        </button>
    </div>
</header>

<div class="card">
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Capacity</th>
                    <th>Is Lab</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="classrooms-table-body">
                <!-- Data populated via JS -->
            </tbody>
        </table>
    </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="addClassroomModal">
    <div class="modal">
        <div class="modal-header">
            <h2>Add Classroom</h2>
            <button class="btn-icon" onclick="closeModal('addClassroomModal')"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <form id="add-classroom-form" onsubmit="handleAddClassroom(event)">
            <div class="form-group">
                <label for="room-name">Name</label>
                <input type="text" id="room-name" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="room-capacity">Capacity</label>
                <input type="number" id="room-capacity" class="form-control" min="1" required>
            </div>
            <div class="form-group checkbox-group">
                <input type="checkbox" id="room-lab">
                <label for="room-lab" style="margin-bottom: 0;">Is Lab</label>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('addClassroomModal')">Cancel</button>
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </form>
    </div>
</div>
